<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Activity Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 700px;
      max-width: 95vw;
      height: 85vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: #1a73e8;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header span { font-weight: 400; opacity: 0.8; font-size: 13px; margin-left: 8px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot {
      align-self: flex-start;
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message .sources {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.6;
    }

    .message.error { background: #fce8e6; color: #c5221f; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #9aa0a6; animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
    }

    #userInput {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: #1a73e8; }

    #sendBtn {
      padding: 10px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    #sendBtn:hover { background: #1557b0; }
    #sendBtn:disabled { background: #9aa0a6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      Team Activity Monitor <span>JIRA + GitHub</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="e.g. What is Alice working on these days?" autocomplete="off" />
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
